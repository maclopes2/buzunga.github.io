<!DOCTYPE html>
<html>

<head>

<title>Buzunga Rio - Encontre seu ônibus</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">

<style>

body, html {
height:100%;
margin:0;
padding:0;
}

#map{
height:calc(100% - 60px);
width:100%;
}

#search{
padding:10px;
background:white;
display:flex;
gap:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.2);
}

#busLine{
flex:1;
padding:8px;
font-size:16px;
}

button{
padding:8px 12px;
cursor:pointer;
}

.custom-marker{
display:flex;
align-items:center;
justify-content:center;
}

.marker-label{
position:absolute;
top:22px;
left:50%;
transform:translateX(-50%);
background:black;
color:white;
font-size:11px;
padding:2px 4px;
border-radius:4px;
}

</style>

</head>

<body>

<div id="search">

<input type="text" id="busLine" placeholder="Digite a linha (ex: 474 ou 474,315)">

<button onclick="filterBuses()">Buscar</button>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/axios/dist/axios.min.js"></script>

<script>

var map;
var busesData=[];
var busMarkers={};
var lineColors={};

function randomColor(){

return "#"+Math.floor(Math.random()*16777215).toString(16);

}

function initializeMap(position){

var lat=position.coords.latitude;
var lon=position.coords.longitude;

map=L.map('map').setView([lat,lon],14);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
attribution:'© OpenStreetMap'
}).addTo(map);

L.marker([lat,lon]).addTo(map).bindPopup("Sua localização").openPopup();

updateBuses();

setInterval(updateBuses,10000);

}

function updateBuses(){

axios.get('https://dados.mobilidade.rio/gps/sppo?output=json')

.then(function(response){

busesData=response.data;

filterBuses();

})

.catch(function(error){

console.log("Erro ao carregar ônibus:",error);

});

}

function filterBuses(){

var search=document.getElementById("busLine").value.trim();

if(!search){
return;
}

var lines=search.split(",").map(function(l){
return l.trim();
});

busesData.forEach(function(bus){

if(!lines.includes(bus.linha)){
return;
}

var ordem=bus.ordem;
var linha=bus.linha;

var lat=parseFloat(bus.latitude.replace(",","."));
var lon=parseFloat(bus.longitude.replace(",","."));

if(!lineColors[linha]){
lineColors[linha]=randomColor();
}

var icon=L.divIcon({

html:

'<div style="color:'+lineColors[linha]+';font-size:20px">'+
'<i class="fas fa-bus"></i>'+
'<div class="marker-label">'+linha+'</div>'+
'</div>',

iconSize:[30,30],
iconAnchor:[15,15]

});

if(busMarkers[ordem]){

busMarkers[ordem].setLatLng([lat,lon]);

}else{

busMarkers[ordem]=L.marker([lat,lon],{icon:icon})

.addTo(map)

.bindPopup("Linha: "+linha+"<br>Ônibus: "+ordem);

}

});

}

function locateUser(){

if(navigator.geolocation){

navigator.geolocation.getCurrentPosition(initializeMap,function(){

alert("Não foi possível obter sua localização.");

});

}else{

alert("Seu navegador não suporta geolocalização.");

}

}

locateUser();

</script>

</body>

</html>
