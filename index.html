<!DOCTYPE html>
<html>
<head>

<title>Buzunga Rio</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"/>

<style>

body,html{
height:100%;
margin:0;
}

#map{
height:calc(100% - 70px);
}

#search{
background:white;
padding:10px;
display:flex;
gap:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.2);
}

#busLine{
flex:1;
padding:8px;
font-size:16px;
}

button{
padding:8px 12px;
cursor:pointer;
}

.marker-label{
position:absolute;
top:22px;
left:50%;
transform:translateX(-50%);
background:black;
color:white;
font-size:11px;
padding:2px 4px;
border-radius:4px;
}

.stop{
background:blue;
border-radius:50%;
width:8px;
height:8px;
}

</style>

</head>

<body>

<div id="search">

<input id="busLine" list="lines" placeholder="Digite a linha (ex: 474)">
<datalist id="lines"></datalist>

<button onclick="filterBuses()">Buscar</button>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/axios/dist/axios.min.js"></script>

<script>

let map
let busesData=[]
let busMarkers={}
let stops=[]
let lineColors={}

function randomColor(){

return "#"+Math.floor(Math.random()*16777215).toString(16)

}

function initMap(position){

let lat=position.coords.latitude
let lon=position.coords.longitude

map=L.map("map").setView([lat,lon],14)

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{
attribution:"© OpenStreetMap"
}).addTo(map)

L.marker([lat,lon]).addTo(map).bindPopup("Você está aqui")

loadStops(lat,lon)

updateBuses()

setInterval(updateBuses,15000)

}

function updateBuses(){

axios.get("https://dados.mobilidade.rio/gps/sppo")

.then(res=>{

busesData=res.data

updateAutocomplete()

filterBuses()

})

.catch(err=>console.log(err))

}

function updateAutocomplete(){

let lines=[...new Set(busesData.map(b=>b.linha))]

let datalist=document.getElementById("lines")

datalist.innerHTML=""

lines.forEach(line=>{

let option=document.createElement("option")

option.value=line

datalist.appendChild(option)

})

}

function filterBuses(){

let search=document.getElementById("busLine").value.trim()

if(!search) return

let lines=search.split(",").map(l=>l.trim())

busesData.forEach(bus=>{

if(!lines.includes(bus.linha)) return

let lat=parseFloat(bus.latitude)
let lon=parseFloat(bus.longitude)

let ordem=bus.ordem
let linha=bus.linha

let direction=bus.direcao || 0

if(!lineColors[linha]){

lineColors[linha]=randomColor()

}

let icon=L.divIcon({

html:

`<div style="transform:rotate(${direction}deg);color:${lineColors[linha]};font-size:20px">

<i class="fas fa-bus"></i>

<div class="marker-label">${linha}</div>

</div>`,

iconSize:[30,30],
iconAnchor:[15,15]

})

if(busMarkers[ordem]){

busMarkers[ordem].setLatLng([lat,lon])

}else{

busMarkers[ordem]=L.marker([lat,lon],{icon}).addTo(map)

.bindPopup("Linha: "+linha+"<br>Ônibus: "+ordem)

}

})

}

async function loadStops(lat,lon){

let query=`
[out:json];
node
["highway"="bus_stop"]
(around:300,${lat},${lon});
out;
`

let url="https://overpass-api.de/api/interpreter?data="+encodeURIComponent(query)

let res=await fetch(url)

let data=await res.json()

data.elements.forEach(stop=>{

let marker=L.circleMarker([stop.lat,stop.lon],{

radius:5,
color:"blue"

}).addTo(map)

marker.bindPopup("Ponto de ônibus")

})

}

function estimateArrival(busLat,busLon,stopLat,stopLon){

let distance=map.distance([busLat,busLon],[stopLat,stopLon])

let speed=20

let time=(distance/1000)/speed*60

return time.toFixed(1)

}

function locate(){

if(navigator.geolocation){

navigator.geolocation.getCurrentPosition(

initMap,

()=>alert("Não foi possível obter localização")

)

}else{

alert("Seu navegador não suporta geolocalização")

}

}

locate()

</script>

</body>
</html>
