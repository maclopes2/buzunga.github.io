<!DOCTYPE html>
<html lang="pt-br">
<head>
    <title>Buzunga Rio</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <style>
        body, html { height: 100%; margin: 0; padding: 0; font-family: sans-serif; background: #f0f0f0; }
        #map { height: calc(100% - 60px); width: 100%; }
        #search { padding: 10px; background: white; display: flex; gap: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); z-index: 1000; position: relative; }
        #busLine { flex: 1; padding: 8px; font-size: 16px; border: 1px solid #ccc; border-radius: 4px; outline: none; }
        #busLine:focus { border-color: #28a745; }
        button { padding: 8px 12px; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 4px; font-weight: bold; }
        
        /* Suavização do movimento */
        .leaflet-marker-icon { transition: all 1.5s linear !important; }

        /* Novo estilo para o container do ícone */
        .bus-icon-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* O ícone do ônibus em si */
        .bus-icon-main {
            font-size: 24px;
            text-shadow: 0 0 3px white;
            filter: drop-shadow(0px 2px 2px rgba(0,0,0,0.3));
        }

        /* O rótulo com o número da linha */
        .bus-label {
            background: white;
            color: #333;
            font-weight: bold;
            font-size: 11px;
            padding: 1px 4px;
            border-radius: 4px;
            border: 1px solid #666;
            margin-top: -2px;
            white-space: nowrap;
        }
    </style>
</head>
<body>

<div id="search">
    <input type="text" id="busLine" placeholder="Linha (ex: 474 ou 315, 483)">
    <button onclick="updateBuses()">Buscar</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/axios/dist/axios.min.js"></script>

<script>
    var map;
    var busMarkers = {}; 
    var lineColors = {};
    const workerUrl = "https://flat-meadow-e697.maclopes2.workers.dev/";

    function getColor(line) {
        if (!lineColors[line]) {
            const colors = ['#e6194b', '#3cb44b', '#4363d8', '#f58231', '#911eb4', '#008080', '#f032e6', '#222222'];
            lineColors[line] = colors[Object.keys(lineColors).length % colors.length];
        }
        return lineColors[line];
    }

    function initializeMap(position) {
        if (!map) {
            map = L.map('map').setView([position.coords.latitude, position.coords.longitude], 14);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            L.circleMarker([position.coords.latitude, position.coords.longitude], {
                radius: 8, color: 'white', fillColor: '#007bff', fillOpacity: 1, weight: 3
            }).addTo(map).bindPopup("Você");
            
            updateBuses();
            setInterval(updateBuses, 15000); 
        }
    }

    function updateBuses() {
        const searchInput = document.getElementById("busLine").value.trim().toUpperCase();
        if (!searchInput) return;

        axios.get(workerUrl)
            .then(function (response) {
                const data = response.data;
                const buses = Array.isArray(data) ? data : (data.veiculos || data.rows || []);
                renderBuses(buses, searchInput);
            })
            .catch(err => console.error("Erro no redirecionador:", err));
    }

    function renderBuses(busesData, searchInput) {
        const lines = searchInput.split(",").map(l => l.trim());
        let activeOrders = [];

        busesData.forEach(function (bus) {
            const linhaBus = bus.linha ? bus.linha.toString().toUpperCase() : "";
            if (!lines.includes(linhaBus)) return;

            const ordem = bus.ordem;
            activeOrders.push(ordem);

            const lat = parseFloat(bus.latitude.toString().replace(",", "."));
            const lon = parseFloat(bus.longitude.toString().replace(",", "."));
            if (isNaN(lat) || isNaN(lon)) return;

            const color = getColor(linhaBus);
            
            // CRIAÇÃO DO NOVO ÍCONE DE ÔNIBUS
            const icon = L.divIcon({
                className: 'bus-icon-container', 
                html: `
                    <i class="fas fa-bus bus-icon-main" style="color: ${color};"></i>
                    <div class="bus-label">${linhaBus}</div>
                `,
                iconSize: [40, 40], 
                iconAnchor: [20, 20] 
            });

            if (busMarkers[ordem]) {
                busMarkers[ordem].setLatLng([lat, lon]);
                // Atualiza o ícone caso a cor mude ou precise forçar re-render
                busMarkers[ordem].setIcon(icon);
            } else {
                busMarkers[ordem] = L.marker([lat, lon], { icon: icon }).addTo(map)
                    .bindPopup(`<b>Linha: ${linhaBus}</b><br>Prefixo: ${ordem}`);
            }
        });

        for (let id in busMarkers) {
            if (!activeOrders.includes(id)) {
                map.removeLayer(busMarkers[id]);
                delete busMarkers[id];
            }
        }
    }

    function locateUser() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(initializeMap, function () {
                initializeMap({ coords: { latitude: -22.9068, longitude: -43.1729 } });
            });
        }
    }

    locateUser();
</script>
</body>
</html>
