<!DOCTYPE html>
<html>

<head>
    <title>Buzunga Rio - Encontre seu ônibus</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">

    <style>
        body, html { height: 100%; margin: 0; padding: 0; font-family: sans-serif; }
        #map { height: calc(100% - 60px); width: 100%; }
        #search {
            padding: 10px;
            background: white;
            display: flex;
            gap: 10px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            z-index: 1000;
            position: relative;
        }
        #busLine { flex: 1; padding: 8px; font-size: 16px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 8px 12px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; font-weight: bold; }
        button:hover { background: #0056b3; }
        .marker-label {
            position: absolute;
            top: 22px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            font-size: 10px;
            padding: 2px 5px;
            border-radius: 4px;
            white-space: nowrap;
        }
    </style>
</head>

<body>

    <div id="search">
        <input type="text" id="busLine" placeholder="Linha (ex: 474 ou 474,315)">
        <button onclick="updateBuses()">Buscar</button>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>

    <script>
        var map;
        var busesData = [];
        var busMarkers = {}; // Guarda os marcadores ativos por 'ordem'
        var lineColors = {};
        var userLocationMarker;

        function randomColor() {
            const colors = ['#e6194b', '#3cb44b', '#ffe119', '#4363d8', '#f58231', '#911eb4', '#46f0f0', '#f032e6', '#bcf60c', '#fabebe'];
            return colors[Math.floor(Math.random() * colors.length)];
        }

        function initializeMap(position) {
            var lat = position.coords.latitude;
            var lon = position.coords.longitude;

            map = L.map('map').setView([lat, lon], 14);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap'
            }).addTo(map);

            userLocationMarker = L.marker([lat, lon]).addTo(map).bindPopup("Você está aqui").openPopup();

            // Primeira busca automática
            updateBuses();
            // Atualiza a cada 15 segundos (respeitando o servidor da prefeitura)
            setInterval(updateBuses, 15000);
        }

function updateBuses() {
    // Substitua pela URL que o Cloudflare gerou para você:
    const minhaUrlWorker = "https://flat-meadow-e697.maclopes2.workers.dev/";

    axios.get(minhaUrlWorker)
        .then(function(response) {
            busesData = response.data;
            renderBuses();
        })
        .catch(function(error) {
            console.log("Erro no Worker:", error);
        });
}

        function renderBuses() {
            var search = document.getElementById("busLine").value.trim();
            if (!search) return;

            var lines = search.split(",").map(l => l.trim().toUpperCase());

            // 1. Identificar quais ordens estão nesta atualização
            let currentOrders = [];

            busesData.forEach(function (bus) {
                // Filtra pela linha digitada
                if (!lines.includes(bus.linha.toString().toUpperCase())) return;

                var ordem = bus.ordem;
                var linha = bus.linha;
                currentOrders.push(ordem);

                // Tratamento de coordenadas (troca vírgula por ponto)
                var lat = parseFloat(bus.latitude.toString().replace(",", "."));
                var lon = parseFloat(bus.longitude.toString().replace(",", "."));

                if (!lineColors[linha]) lineColors[linha] = randomColor();

                var icon = L.divIcon({
                    className: 'custom-marker',
                    html: `
                        <div style="color:${lineColors[linha]}; font-size:22px; text-shadow: 1px 1px 2px #000;">
                            <i class="fas fa-bus"></i>
                            <div class="marker-label">${linha}</div>
                        </div>`,
                    iconSize: [30, 30],
                    iconAnchor: [15, 15]
                });

                if (busMarkers[ordem]) {
                    // Se o ônibus já existe, apenas move
                    busMarkers[ordem].setLatLng([lat, lon]);
                } else {
                    // Se é novo, cria o marcador
                    busMarkers[ordem] = L.marker([lat, lon], { icon: icon })
                        .addTo(map)
                        .bindPopup(`<b>Linha: ${linha}</b><br>Ordem: ${ordem}<br>Atualizado: ${bus.dataHora}`);
                }
            });

            // 2. Remover do mapa ônibus que sumiram do GPS ou mudaram de linha na busca
            for (let id in busMarkers) {
                if (!currentOrders.includes(id)) {
                    map.removeLayer(busMarkers[id]);
                    delete busMarkers[id];
                }
            }
        }

        function locateUser() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(initializeMap, function () {
                    // Fallback se o GPS falhar (centraliza no Centro do Rio)
                    initializeMap({ coords: { latitude: -22.9068, longitude: -43.1729 } });
                });
            } else {
                alert("Seu navegador não suporta geolocalização.");
            }
        }

        locateUser();
    </script>
</body>
</html>
