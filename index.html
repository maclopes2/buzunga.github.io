<!DOCTYPE html>
<html>
<head>
    <title>Buzunga Rio. Encontre seu ônibus!!</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <style>
        body, html {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        #map {
            height: calc(100% - 60px);
            width: 100%;
        }

        #search {
            padding: 10px;
            background-color: #fff;
            box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .marker-label {
            background-color: #333;
            color: #fff;
            border-radius: 5px;
            padding: 2px 5px;
            font-size: 12px;
            font-weight: bold;
            line-height: 1.2;
        }
    </style>
</head>
<body>
    <div id="search">
        <input type="text" id="busLine" placeholder="Digite os números das linhas, separados por vírgula" />
        <button onclick="filterBuses()">Buscar</button>
    </div>
    <div id="map"></div>

    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <script>
        var map;
        var busMarkers = {};
        var busesData = [];
        var lineColors = {};

        function getRandomColor() {
            var letters = '0123456789ABCDEF';
            var color = '#';
            for (var i = 0; i < 6; i++) {
                color += letters[Math.floor(Math.random() * 16)];
            }
            return color;
        }

        function initializeMap(position) {
            var userLat = position.coords.latitude;
            var userLng = position.coords.longitude;

            map = new google.maps.Map(document.getElementById("map"), {
                center: { lat: userLat, lng: userLng },
                zoom: 15
            });

            new google.maps.Marker({
                position: { lat: userLat, lng: userLng },
                map: map,
                title: "Sua localização"
            });

            setInterval(updateBuses, 60000);
            updateBuses();
        }

        function handleLocationError(error) {
            console.log("Erro ao obter localização:", error.message);
            alert("Não foi possível obter sua localização. Verifique as permissões do navegador.");
        }

        function updateBuses() {
            axios.get('https://dados.mobilidade.rio/gps/sppo')
                .then(function (response) {
                    busesData = response.data;
                    filterBuses();
                })
                .catch(function (error) {
                    console.log(error);
                });
        }

        function filterBuses() {
            var searchValue = document.getElementById('busLine').value.trim();
            var searchLines = searchValue.split(',').map(function(line) { return line.trim(); });

            // Se não houver linhas digitadas, não mostra nada
            if (searchLines.length === 0 || searchLines[0] === "") {
                return;
            }

            var filteredBuses = busesData.filter(function(bus) {
                return searchLines.includes(bus.linha);
            });

            filteredBuses.forEach(function(bus) {
                var ordem = bus.ordem;
                var lat = parseFloat(bus.latitude.replace(',', '.'));
                var lon = parseFloat(bus.longitude.replace(',', '.'));
                var linha = bus.linha;

                // Ignora dados inválidos
                if (!lat || !lon || isNaN(lat) || isNaN(lon)) return;

                if (!lineColors[linha]) {
                    lineColors[linha] = getRandomColor();
                }

                var icon = {
                    path: google.maps.SymbolPath.CIRCLE,
                    scale: 8,
                    fillColor: lineColors[linha],
                    fillOpacity: 1,
                    strokeWeight: 1
                };

                if (busMarkers[ordem]) {
                    busMarkers[ordem].setPosition({ lat: lat, lng: lon });
                } else {
                    busMarkers[ordem] = new google.maps.Marker({
                        position: { lat: lat, lng: lon },
                        map: map,
                        icon: icon,
                        title: "Linha: " + linha + " | Ordem: " + ordem
                    });
                }
            });
        }

        function locateUser() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(initializeMap, handleLocationError);
            } else {
                alert("Geolocalização não é suportada pelo seu navegador.");
            }
        }

        // Inicializa a localização ao carregar a página
        locateUser();
    </script>

    <!-- Carregue a API do Google Maps com sua chave -->
    <script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDIXNb9QQ6gREN8imJ4_UIDFn1HOfAAQ1o"></script>
</body>
</html>
