<!DOCTYPE html>
<html>
<head>
    <title>Buzunga Rio. Encontre seu ônibus!!</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body, html { height: 100%; margin: 0; padding: 0; }
        #map { height: calc(100% - 60px); width: 100%; }
        #search { padding: 10px; background-color: #fff; box-shadow: 0px 4px 6px rgba(0,0,0,0.1); display: flex; }
        #search input { flex: 1; margin-right: 10px; }
    </style>
</head>
<body>
    <div id="search">
        <input type="text" id="busLine" placeholder="Digite as linhas (ex: 805, 309)" />
        <button onclick="filterBuses()">Buscar</button>
    </div>
    <div id="map"></div>

    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <script>
        let map;
        let busMarkers = {};
        let busesData = [];
        let lineColors = {};

        function getRandomColor() {
            return '#' + Math.floor(Math.random()*16777215).toString(16);
        }

        function initMap() {
            // Localização padrão (Centro do Rio) caso geolocalização falhe
            const defaultLocation = { lat: -22.9068, lng: -43.1729 };
            map = new google.maps.Map(document.getElementById("map"), {
                center: defaultLocation,
                zoom: 13
            });

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    const userLat = pos.coords.latitude;
                    const userLng = pos.coords.longitude;
                    map.setCenter({ lat: userLat, lng: userLng });
                    new google.maps.Marker({
                        position: { lat: userLat, lng: userLng },
                        map: map,
                        title: "Sua localização"
                    });
                });
            }

            updateBuses();
            setInterval(updateBuses, 60000);
        }

        function updateBuses() {
            axios.get('https://dados.mobilidade.rio/gps/sppo')
                .then(response => {
                    busesData = response.data;
                    filterBuses();
                })
                .catch(error => console.error("Erro ao buscar dados:", error));
        }

        function filterBuses() {
            const searchValue = document.getElementById('busLine').value.trim();
            const searchLines = searchValue ? searchValue.split(',').map(l => l.trim()) : [];

            // Remove marcadores antigos
            for (let ordem in busMarkers) {
                busMarkers[ordem].setMap(null);
            }
            busMarkers = {};

            busesData.forEach(bus => {
                if (searchLines.length === 0 || searchLines.includes(bus.linha)) {
                    const lat = parseFloat(bus.latitude.replace(',', '.'));
                    const lon = parseFloat(bus.longitude.replace(',', '.'));
                    const ordem = bus.ordem;
                    const linha = bus.linha;

                    if (!lineColors[linha]) lineColors[linha] = getRandomColor();

                    const icon = {
                        path: google.maps.SymbolPath.CIRCLE,
                        scale: 6,
                        fillColor: lineColors[linha],
                        fillOpacity: 1,
                        strokeWeight: 1
                    };

                    busMarkers[ordem] = new google.maps.Marker({
                        position: { lat, lng: lon },
                        map: map,
                        icon: icon,
                        title: `Linha: ${linha} | Ordem: ${ordem}`
                    });
                }
            });
        }
    </script>

    <!-- Substitua pela sua chave válida -->
    <script async defer src="https://maps.googleapis.com/maps/api/js?key=SUA_CHAVE_AQUI&callback=initMap"></script>
</body>
</html>
