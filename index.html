<!DOCTYPE html>
<html>
<head>
<title>Buzunga Rio - Encontre seu ônibus</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"/>

<style>

body,html{
height:100%;
margin:0;
}

#map{
height:calc(100% - 60px);
}

#search{
padding:10px;
background:white;
display:flex;
gap:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.2);
}

.custom-marker{
display:flex;
align-items:center;
justify-content:center;
}

.marker-label{
position:absolute;
top:22px;
left:50%;
transform:translateX(-50%);
background:#000;
color:white;
font-size:11px;
padding:2px 4px;
border-radius:4px;
}

</style>
</head>

<body>

<div id="search">

<input id="busLine" placeholder="Digite as linhas (ex: 474,315)">

<button onclick="filterBuses()">Buscar</button>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="https://unpkg.com/axios/dist/axios.min.js"></script>

<script>

let map
let busesData=[]
let busMarkers={}
let lineColors={}

function randomColor(){

return "#"+Math.floor(Math.random()*16777215).toString(16)

}

function initMap(pos){

let lat=pos.coords.latitude
let lng=pos.coords.longitude

map=L.map('map').setView([lat,lng],14)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
attribution:'© OpenStreetMap'
}).addTo(map)

L.marker([lat,lng]).addTo(map).bindPopup("Sua localização")

updateBuses()

setInterval(updateBuses,15000)

}

function updateBuses(){

axios.get("https://dados.mobilidade.rio/gps/sppo")

.then(res=>{

busesData=res.data

filterBuses()

})

.catch(err=>console.log(err))

}

function filterBuses(){

let search=document.getElementById("busLine").value.trim()

if(search==="") return

let lines=search.split(",").map(l=>l.trim())

let filtered=busesData.filter(bus=>lines.includes(bus.linha))

filtered.forEach(bus=>{

let ordem=bus.ordem
let linha=bus.linha

let lat=parseFloat(bus.latitude)
let lon=parseFloat(bus.longitude)

if(!lineColors[linha]){

lineColors[linha]=randomColor()

}

let icon=L.divIcon({

html:

`<div class="custom-marker">

<i class="fas fa-bus" style="color:${lineColors[linha]};font-size:18px"></i>

<div class="marker-label">${linha}</div>

</div>`,

iconSize:[30,30],
iconAnchor:[15,15]

})

if(busMarkers[ordem]){

busMarkers[ordem].setLatLng([lat,lon])

}else{

busMarkers[ordem]=L.marker([lat,lon],{icon:icon})

.addTo(map)

.bindPopup(`Linha ${linha}<br>Ordem ${ordem}`)

}

})

}

function locate(){

navigator.geolocation.getCurrentPosition(

initMap,

err=>alert("Não foi possível obter sua localização")

)

}

locate()

</script>

</body>
</html>
