<!DOCTYPE html>
<html lang="pt-br">
<head>
    <title>Buzunga Rio - GPS</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <style>
        body, html { height: 100%; margin: 0; padding: 0; font-family: sans-serif; }
        #map { height: calc(100% - 60px); width: 100%; }
        #search { padding: 10px; background: white; display: flex; gap: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); z-index: 1000; position: relative; }
        #busLine { flex: 1; padding: 8px; font-size: 16px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 8px 12px; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 4px; font-weight: bold; }
        
        /* ESTILO DO ÍCONE CIRCULAR */
        .bus-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .bus-circle {
            width: 30px;
            height: 30px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
            border: 2px solid;
            font-size: 16px;
        }

        .bus-tag {
            background: rgba(0,0,0,0.8);
            color: white;
            font-size: 10px;
            padding: 1px 4px;
            border-radius: 3px;
            margin-top: -2px;
            font-weight: bold;
            white-space: nowrap;
        }

        .leaflet-marker-icon { transition: all 1.5s linear !important; }
    </style>
</head>
<body>

<div id="search">
    <input type="text" id="busLine" placeholder="Digite a linha (ex: 474,315)">
    <button onclick="updateBuses()">Buscar</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/axios/dist/axios.min.js"></script>

<script>
    var map;
    var busMarkers = {}; 
    var lineColors = {};
    // Usei o seu Worker direto, sem o corsproxy.io que deu erro 403
    const workerUrl = "https://flat-meadow-e697.maclopes2.workers.dev/";

    function randomColor() {
        const colors = ['#e6194b', '#3cb44b', '#4363d8', '#f58231', '#911eb4', '#008080', '#f032e6'];
        return colors[Math.floor(Math.random() * colors.length)];
    }

    function initializeMap(position) {
        map = L.map('map').setView([position.coords.latitude, position.coords.longitude], 14);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);
        
        L.marker([position.coords.latitude, position.coords.longitude]).addTo(map).bindPopup("Você");

        updateBuses();
        setInterval(updateBuses, 15000); 
    }

    function updateBuses() {
        axios.get(workerUrl)
            .then(function (response) {
                // Tratamento para garantir que response.data seja um array
                const data = Array.isArray(response.data) ? response.data : [];
                renderBuses(data);
            })
            .catch(err => console.error("Erro ao carregar ônibus:", err));
    }

    function renderBuses(buses) {
        var search = document.getElementById("busLine").value.trim().toUpperCase();
        if (!search) return;

        var lines = search.split(",").map(l => l.trim());
        let activeOrders = [];

        buses.forEach(function (bus) {
            var linhaBus = (bus.linha || "").toString().toUpperCase();
            if (!lines.includes(linhaBus)) return;

            var ordem = bus.ordem;
            activeOrders.push(ordem);

            var lat = parseFloat(bus.latitude.toString().replace(",", "."));
            var lon = parseFloat(bus.longitude.toString().replace(",", "."));

            if (!lineColors[linhaBus]) lineColors[linhaBus] = randomColor();

            var iconHtml = `
                <div class="bus-wrapper">
                    <div class="bus-circle" style="border-color: ${lineColors[linhaBus]}; color: ${lineColors[linhaBus]};">
                        <i class="fas fa-bus"></i>
                    </div>
                    <div class="bus-tag">${linhaBus}</div>
                </div>
            `;

            var icon = L.divIcon({
                className: 'custom-icon',
                html: iconHtml,
                iconSize: [30, 42],
                iconAnchor: [15, 30]
            });

            if (busMarkers[ordem]) {
                busMarkers[ordem].setLatLng([lat, lon]);
            } else {
                busMarkers[ordem] = L.marker([lat, lon], { icon: icon }).addTo(map)
                    .bindPopup(`<b>Linha: ${linhaBus}</b><br>Ordem: ${ordem}`);
            }
        });

        for (let id in busMarkers) {
            if (!activeOrders.includes(id)) {
                map.removeLayer(busMarkers[id]);
                delete busMarkers[id];
            }
        }
    }

    function locateUser() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(initializeMap, () => {
                initializeMap({ coords: { latitude: -22.9068, longitude: -43.1729 } });
            });
        }
    }

    locateUser();
</script>
</body>
</html>
