<style>
    /* ... seus estilos anteriores ... */
    .bus-stop {
        background: white;
        border: 2px solid #007bff;
        border-radius: 50%;
    }
</style>

<script>
    // Variáveis globais novas
    var currentRouteLayer; // Para guardar o desenho do trajeto
    var stopsLayer = L.layerGroup(); // Para agrupar os pontos de ônibus

    // ... (funções initializeMap e updateBuses continuam as mesmas)

    function renderBuses() {
        // ... (lógica de renderização dos ônibus continua igual)
        
        // No momento de criar o marcador do ônibus, adicionamos o evento de clique:
        if (busMarkers[ordem]) {
            busMarkers[ordem].setLatLng([lat, lon]);
        } else {
            busMarkers[ordem] = L.marker([lat, lon], { icon: icon })
                .addTo(map)
                .on('click', function() {
                    mostrarTrajeto(linhaBus);
                })
                .bindPopup(`<b>Linha: ${linhaBus}</b><br>Clique para ver o trajeto.`);
        }
    }

    function mostrarTrajeto(linha) {
        // Remove trajeto anterior se existir
        if (currentRouteLayer) map.removeLayer(currentRouteLayer);
        
        console.log("Buscando trajeto da linha: " + linha);
        
        // URL da API de itinerários (exemplo conceitual - requer endpoint de GeoJSON do Data.Rio)
        // Como trajetos são fixos, o ideal é ter um arquivo JSON com eles ou usar o Overpass API (OpenStreetMap)
        const rotaUrl = `https://itinerarios.mobilidade.rio/api/v1/itinerario/${linha}`;

        axios.get(workerUrl + "?url=" + encodeURIComponent(rotaUrl)) // Usando seu worker
            .then(function(response) {
                // Aqui desenhamos a linha no mapa
                // Supondo que a resposta seja um conjunto de coordenadas
                var coordenadas = response.data.map(p => [p.lat, p.lon]);
                currentRouteLayer = L.polyline(coordenadas, {color: 'blue', weight: 5, opacity: 0.6}).addTo(map);
                map.fitBounds(currentRouteLayer.getBounds()); // Ajusta o zoom para ver o trajeto todo
            })
            .catch(err => console.log("Trajeto não encontrado para esta linha."));
    }
</script>
