<!DOCTYPE html>
<html>
<head>
    <title>Buzunga Rio - Encontre seu ônibus!</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body, html { height: 100%; margin: 0; padding: 0; }
        #map { height: calc(100% - 60px); width: 100%; }
        #search { padding: 10px; background: #fff; display: flex; gap: 10px; }
    </style>
</head>
<body>
    <div id="search">
        <input type="text" id="busLine" placeholder="Digite as linhas (ex: 474, 455)" />
        <button onclick="filterBuses()">Buscar</button>
    </div>
    <div id="map"></div>

    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <script>
        let map;
        let busMarkers = {};
        let busesData = [];
        let lineColors = {};

        function getRandomColor() {
            return '#' + Math.floor(Math.random()*16777215).toString(16);
        }

        function initializeMap() {
            // Centraliza no Rio se não conseguir geolocalização
            const defaultCenter = { lat: -22.9068, lng: -43.1729 };
            map = new google.maps.Map(document.getElementById("map"), {
                center: defaultCenter,
                zoom: 13
            });

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    map.setCenter({ lat: pos.coords.latitude, lng: pos.coords.longitude });
                    new google.maps.Marker({
                        position: { lat: pos.coords.latitude, lng: pos.coords.longitude },
                        map: map,
                        title: "Sua localização"
                    });
                });
            }

            updateBuses();
            setInterval(updateBuses, 60000);
        }

        function updateBuses() {
            axios.get('https://dados.mobilidade.rio/gps/sppo')
                .then(res => {
                    busesData = res.data;
                    filterBuses();
                })
                .catch(err => console.error("Erro API:", err));
        }

        function filterBuses() {
            const searchValue = document.getElementById('busLine').value.trim();
            const searchLines = searchValue ? searchValue.split(',').map(l => l.trim().toUpperCase()) : [];

            // Remove marcadores antigos
            for (let ordem in busMarkers) {
                busMarkers[ordem].setMap(null);
            }
            busMarkers = {};

            busesData.forEach(bus => {
                const linha = bus.linha.toUpperCase();
                if (searchLines.length === 0 || searchLines.includes(linha)) {
                    const lat = parseFloat(bus.latitude);
                    const lon = parseFloat(bus.longitude);
                    if (isNaN(lat) || isNaN(lon)) return;

                    if (!lineColors[linha]) lineColors[linha] = getRandomColor();

                    const icon = {
                        path: google.maps.SymbolPath.CIRCLE,
                        scale: 6,
                        fillColor: lineColors[linha],
                        fillOpacity: 1,
                        strokeWeight: 1
                    };

                    busMarkers[bus.ordem] = new google.maps.Marker({
                        position: { lat, lng: lon },
                        map,
                        icon,
                        title: `Linha: ${linha} | Ordem: ${bus.ordem}`
                    });
                }
            });
        }
    </script>

    <!-- Carregue a API do Google Maps com sua chave -->
    <script async defer src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&callback=initializeMap"></script>
</body>
</html>
